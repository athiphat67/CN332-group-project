{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">

<nav class="app-sidebar">

    <!-- BRAND -->
    <div class="sidebar-brand">
        <div class="bg-white rounded-circle d-flex align-items-center justify-content-center shadow-sm"
             style="width: 40px; height: 40px;">
            <i class="bi bi-house-door-fill sidebar-brand-icon"></i>
        </div>
        <span class="sidebar-brand-text">BaanHao</span>
    </div>

    <!-- PROFILE -->
    <div class="sidebar-profile">
        <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80"
             alt="Profile" class="profile-avatar">

        <div class="profile-status">On duty</div>
        <h6 class="profile-name">{{ user.username|default:"Jaidee Meekwamsuk" }}</h6>
        <span class="profile-role-badge">Admin</span>
        <span class="profile-work-time">8:00 AM - 8:00 PM</span>
    </div>

    <!-- MENU -->
    <div class="sidebar-menu-title">MENU</div>

    <div class="nav flex-column w-100">

        <!-- Dashboard -->
        <a class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
           href="{% url 'dashboard' %}">
            <i class="bi bi-bar-chart-fill"></i>
            <span>Dashboard</span>
        </a>

        <!-- All Tasks -->
        <a class="sidebar-link {% if request.resolver_match.url_name == 'all_tasks' %}active{% endif %}"
           href="{% url 'issues:all_tasks' %}">
            <i class="bi bi-list-task"></i>
            <span>All Tasks</span>
        </a>

        <!-- Notifications (Dropdown) -->
<div class="sidebar-dropdown">

    <a href="javascript:void(0);"
       class="sidebar-link d-flex justify-content-between align-items-center"
       onclick="toggleNotiMenu()">

        <span>
            <i class="bi bi-bell"></i>
            Notifications
        </span>

        <i class="bi bi-chevron-down 
           {% if request.resolver_match.app_name == 'notifications' %}rotate{% endif %}" 
           id="notiArrow"></i>
    </a>

    <!-- ✅ เปิดค้างถ้าอยู่หน้า notifications -->
    <div class="submenu 
         {% if request.resolver_match.app_name == 'notifications' %}show{% endif %}" 
         id="notiSubmenu">

        <!-- ✅ Active All Notification -->
        <a href="{% url 'notifications:list' %}" 
           class="sidebar-sublink 
           {% if request.resolver_match.url_name == 'list' %}active{% endif %}">
            <i class="bi bi-envelope"></i>
            All Notification
        </a>

        <!-- ✅ Active Broadcast -->
        <a href="{% url 'notifications:broadcast_system' %}" 
            class="sidebar-sublink 
            {% if request.resolver_match.url_name == 'broadcast_system' %}active{% endif %}">
            <i class="bi bi-megaphone"></i>
            Broadcast System
        </a>

    </div>
</div>

        <!-- Analytics -->
        <a class="sidebar-link"
           href="{% url 'analytic' %}">
            <i class="bi bi-pie-chart-fill"></i>
            <span>Analytics</span>
        </a>

        <!-- Staff -->
        <a class="sidebar-link"
           href="{% url 'users:staff_list' %}">
            <i class="bi bi-people-fill"></i>
            <span>Staff</span>
        </a>

    </div>

    <!-- OTHERS -->
    <div class="sidebar-menu-title mt-4">OTHERS</div>

    <div class="nav flex-column w-100 mt-auto pb-3">

        <a class="sidebar-link" href="#">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a>

        <a class="sidebar-link" href="#">
            <i class="bi bi-info-circle-fill"></i>
            <span>Help</span>
        </a>

        <a class="sidebar-link" href="{% url 'users:logout' %}">
            <i class="bi bi-box-arrow-right"></i>
            <span>Log out</span>
        </a>

    </div>

</nav>
