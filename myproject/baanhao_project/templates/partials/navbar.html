{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
<nav class="app-sidebar">
    <div class="sidebar-brand">
        <div class="bg-white rounded-circle d-flex align-items-center justify-content-center shadow-sm"
            style="width: 40px; height: 40px;">
            <i class="bi bi-house-door-fill sidebar-brand-icon"></i>
        </div>
        <span class="sidebar-brand-text">BaanHao</span>
    </div>

    <div class="sidebar-profile">
        <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" 
             alt="Profile" class="profile-avatar">
        
        <div class="profile-status">On duty</div>
        <h6 class="profile-name">{{ user.username|default:"Jaidee Meekwamsuk" }}</h6>
        <span class="profile-role-badge">Admin</span>
        <span class="profile-work-time">8:00 AM - 8:00 PM</span>
    </div>

    <div class="sidebar-menu-title">MENU</div>
    <div class="nav flex-column w-100">
        <a class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
            <i class="bi bi-bar-chart-fill"></i> Dashboard
        </a>
        <a class="sidebar-link {% if request.resolver_match.url_name == 'all_tasks' %}active{% endif %}" href="{% url 'all_tasks' %}">
            <i class="bi bi-list-task"></i> All Tasks
        </a>
        <a class="sidebar-link" href="#">
            <i class="bi bi-bell-fill"></i> Notifications
        </a>
        <a class="sidebar-link nav-link" href="{% url 'analytic' %}">
            <i class="bi bi-pie-chart-fill"></i> Analytics
        </a>
        <a class="sidebar-link" href="{% url 'users:staff_list' %}">
            <i class="bi bi-people-fill"></i> Staff
        </a>
    </div>

    <div class="sidebar-menu-title mt-4">OTHERS</div>
    <div class="nav flex-column w-100 mt-auto pb-3">
        <a class="sidebar-link" href="#">
            <i class="bi bi-gear-fill"></i> Settings
        </a>
        <a class="sidebar-link" href="#">
            <i class="bi bi-info-circle-fill"></i> Help
        </a>
        <a class="sidebar-link" href="{% url 'users:logout' %}">
            <i class="bi bi-box-arrow-right"></i> Log out
        </a>
    </div>
</nav>
