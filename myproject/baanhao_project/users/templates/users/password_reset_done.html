<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent - Baan Hao Smart Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(180deg, #FFF8E1 0%, #FFECB3 100%);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .page-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .back-link {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 30px;
            background: linear-gradient(135deg, #7C4DFF 0%, #536DFE 50%, #448AFF 100%);
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(124, 77, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path
                    d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
            </svg>
        </div>
        <h1 class="page-title">Check Your Email</h1>
        <p class="page-description">
            Check your email for a link to reset your password.<br>
            If it doesn't appear within a few minutes, check your spam folder.
        </p>
        <a href="{% url 'users:login' %}" class="back-link">Back to Sign In</a>
    </div>
</body>

</html>
