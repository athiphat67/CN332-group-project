<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Baan Hao Smart Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(180deg, #FFF8E1 0%, #FFECB3 100%);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo-svg {
            width: 100px;
            height: 75px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #1a237e;
            letter-spacing: 2px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: #FF9800;
            font-weight: 500;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .page-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .reset-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #E0E0E0;
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: #fff;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #7C4DFF;
            box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.1);
        }

        .form-input::placeholder {
            color: #9E9E9E;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #7C4DFF 0%, #536DFE 50%, #448AFF 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(124, 77, 255, 0.5);
        }

        .back-link {
            color: #7C4DFF;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .error-messages {
            background: #FFEBEE;
            border: 1px solid #FFCDD2;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .error-messages ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .error-messages li {
            color: #C62828;
            font-size: 13px;
            padding: 3px 0;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        {% load static %}
        <img src="{% static 'images/baanhao_logo.png' %}" alt="Baan Hao Smart Living"
            style="width: 180px; margin-bottom: 30px;">

        <h1 class="page-title">Reset Password</h1>
        <p class="page-description">
            Enter your registered email to reset your password
        </p>

        {% if form.errors %}
        <div class="error-messages">
            <ul>
                {% for field in form %}
                {% for error in field.errors %}
                <li>{{ error }}</li>
                {% endfor %}
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form class="reset-form" method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="email" name="email" class="form-input" placeholder="Email Address" required>
            </div>
            <button type="submit" class="submit-btn">Send Reset Link</button>
        </form>

        <a href="{% url 'users:login' %}" class="back-link">← Back to Sign In</a>
    </div>
</body>

</html>
