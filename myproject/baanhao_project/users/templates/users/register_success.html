<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Submitted - Baan Hao Smart Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(180deg, #FFF8E1 0%, #FFECB3 100%);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
            padding: 60px 50px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #66BB6A 0%, #43A047 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        .success-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .success-message {
            font-size: 15px;
            color: #616161;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .success-message strong {
            color: #333;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 35px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #7C4DFF 0%, #536DFE 50%, #448AFF 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(124, 77, 255, 0.5);
        }

        .footer-text {
            margin-top: 40px;
            color: #9E9E9E;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="success-container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
        </div>
        <h1 class="success-title">Sign Up Successful!</h1>
        <p class="success-message">
            Your sign up request has been submitted to the <strong>Administrator</strong>.<br>
            Please wait for approval before accessing the system.
        </p>
        <a href="{% url 'users:login' %}" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            Return to Sign In
        </a>
        <p class="footer-text">Where Logic Meets Living. Established 2026.</p>
    </div>
</body>

</html>
